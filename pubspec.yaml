name: e_com_flutter
description: "Single-Vendor E-Commerce Flutter App with Sham Cash Payment Integration"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  # State Management
  provider: ^6.1.2
  # Networking
  dio: ^5.7.0
  # Secure Local Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  # UI Enhancements
  shimmer: ^3.0.0
  fluttertoast: ^8.2.12
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
